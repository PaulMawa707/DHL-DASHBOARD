# Local / server deploy: copy .env.example -> .env and set secrets, then:
#   docker compose up -d --build
#
# Do not commit .env or .vss_token.txt with real credentials.

services:
  dhl-dashboard:
    build: .
    image: dhl-dashboard:latest
    ports:
      - "${DHL_PUBLISH_PORT:-8050}:8050"
    env_file:
      - .env
    environment:
      DHL_DASH_HOST: "0.0.0.0"
      DHL_DASH_PORT: "8050"
    restart: unless-stopped
